<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ansagen-Generator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

  <div class="app-bar">
    <span class="material-icons app-bar-icon">campaign</span>
    <span class="app-bar-title">Ansagen-Generator</span>
  </div>

  <div class="container">

    <!-- Schnellansagen -->
    <div class="card">
      <div class="card-header">
        <span class="material-icons card-header-icon">flash_on</span>
        <span class="card-header-title">Schnellansagen</span>
      </div>
      <div class="quick-buttons">
        <button class="btn-quick" onclick="playQuick('audio/Hinweise/einsteigen.mp3')">
          <span class="material-icons">login</span>
          <span>Einsteigen bitte</span>
        </button>
        <button class="btn-quick btn-quick--warn" onclick="playQuick('audio/Hinweise/zurueckbleiben.mp3')">
          <span class="material-icons">warning</span>
          <span>Zurückbleiben bitte</span>
        </button>
        <button class="btn-quick btn-quick--danger" onclick="playQuick('audio/Hinweise/abfahrt.mp3')">
          <span class="material-icons">directions_railway</span>
          <span>Halten Sie Abstand – Zug fährt ab</span>
        </button>
      </div>
    </div>

    <!-- Ansage Generator -->
    <div class="card">
      <div class="card-header">
        <span class="material-icons card-header-icon">settings_voice</span>
        <span class="card-header-title">Ansage generieren</span>
      </div>

      <!-- Gong -->
      <div class="form-field">
        <label class="form-label" for="gong">Gong</label>
        <div class="select-wrapper">
          <select id="gong" class="form-select">
            <option value="">(kein Gong)</option>
          </select>
          <span class="material-icons select-arrow">expand_more</span>
        </div>
      </div>

      <div class="form-field">
        <label class="form-label" for="line">Liniennummer</label>
        <div class="select-wrapper">
          <select id="line" class="form-select">
            <option value="">(keine)</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="10">10</option>
          </select>
          <span class="material-icons select-arrow">expand_more</span>
        </div>
      </div>

      <div class="form-field">
        <label class="form-label" for="destination">Zielhaltestelle</label>
        <div class="select-wrapper">
          <select id="destination" class="form-select"></select>
          <span class="material-icons select-arrow">expand_more</span>
        </div>
      </div>

      <div class="form-field">
        <label class="form-label">Via-Haltestellen (optional)</label>
        <div class="via-container" id="via-container"></div>
        <button class="btn-add-via" id="btn-add-via" type="button">
          <span class="material-icons">add</span>
          Via-Haltestelle hinzufügen
        </button>
      </div>

      <div class="form-field form-field--row">
        <label class="md-checkbox">
          <input type="checkbox" id="enableSpecial">
          <span class="md-checkbox-box"></span>
          <span class="md-checkbox-label">Sonderansage hinzufügen</span>
        </label>
      </div>

      <div class="form-field">
        <label class="form-label" for="special">Sonderansage</label>
        <div class="select-wrapper">
          <select id="special" class="form-select" disabled></select>
          <span class="material-icons select-arrow">expand_more</span>
        </div>
      </div>

      <div class="action-buttons">
        <button class="btn-primary" onclick="generateAndPlay()">
          <span class="material-icons">play_arrow</span>
          Ansage abspielen
        </button>
        <button class="btn-secondary" onclick="playSpecialOnly()">
          <span class="material-icons">volume_up</span>
          Nur Sonderansage
        </button>
      </div>

      <p id="output" class="output-text"></p>
    </div>

    <!-- Download -->
    <div class="card">
      <div class="card-header">
        <span class="material-icons card-header-icon">download</span>
        <span class="card-header-title">Ansage herunterladen</span>
      </div>
      <div class="download-section">
        <p class="download-info">Generiere zuerst eine Ansage, dann kannst du sie hier als MP3 herunterladen.</p>
        <button class="btn-download" id="btn-download" disabled onclick="downloadAnsage()">
          <span class="material-icons">download</span>
          Als MP3 herunterladen
        </button>
      </div>
    </div>

  </div>

  <audio id="audioPlayer"></audio>
  <script src="sript.js"></script>
</body>
</html>
